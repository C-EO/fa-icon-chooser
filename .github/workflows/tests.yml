name: Tests

on: [push]

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - name: Install Deps
        run: |
          cd packages/fa-icon-chooser
          npm install
      - name: Run Tests
        run: |
          cd packages/fa-icon-chooser
          npm run test
      - name: Check Format
        run: |
          cd packages/fa-icon-chooser
          npm run format.check
